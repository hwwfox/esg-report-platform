name: ci

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]

permissions:
  contents: read
  pull-requests: read

jobs:
  quality-gate:
    name: quality-gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: esg_user
          POSTGRES_PASSWORD: esg_password
          POSTGRES_DB: esg_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:  
      APP_ENV: test
      DATABASE_URL: postgresql://esg_user:esg_password@localhost:5432/esg_dev
      REDIS_URL: redis://localhost:6379/0
      AI_PROVIDER: mock
      AI_API_KEY: ${{ secrets.AI_API_KEY }}  # pragma: secret-scan-ignore
      JWT_SECRET: ${{ secrets.JWT_SECRET }}  # pragma: secret-scan-ignore
      LOG_LEVEL: INFO

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
        # Remove the 'cache: npm' line if no lock file exists
        #  cache: 'npm'
        continue-on-error: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify repository structure
        run: |
          test -f AGENTS.md
          test -f README.md
          test -f .env.example
          test -f docker-compose.dev.yml
          test -d contracts/openapi
          test -d db/ddl
          test -d db/seed
          test -d docs/dev-tasks

      - name: Secret scan
        run: bash scripts/check-no-secrets.sh

      - name: OpenAPI and Mock sync check
        run: bash scripts/check-openapi-mock-sync.sh

      - name: Migration check
        run: bash scripts/check-migrations.sh

      - name: Install dependencies
        run: make install

      - name: Run local quality gate
        run: make ci-local
