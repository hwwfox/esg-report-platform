components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ApiResponse:
      type: object
      required:
      - success
      - data
      - message
      - request_id
      - timestamp
      properties:
        success:
          type: boolean
        data:
          nullable: true
        message:
          type: string
        request_id:
          type: string
        timestamp:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      required:
      - success
      - message
      - error
      properties:
        success:
          type: boolean
          example: false
        data:
          nullable: true
        message:
          type: string
        error:
          $ref: '#/components/schemas/ErrorObject'
        request_id:
          type: string
        timestamp:
          type: string
          format: date-time
    ErrorObject:
      type: object
      properties:
        code:
          type: string
        type:
          type: string
        details:
          type: object
          additionalProperties: true
    PagedResponse:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
        page:
          type: integer
        page_size:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
    LoginRequest:
      type: object
      required:
      - email
      - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        captcha_token:
          type: string
    LoginResponse:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
        user:
          $ref: '#/components/schemas/User'
        available_tenants:
          type: array
          items:
            $ref: '#/components/schemas/TenantAccess'
    AuthRefreshRequest:
      type: object
      required:
      - refresh_token
      properties:
        refresh_token:
          type: string
    AuthRefreshResponse:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
    LogoutResponse:
      type: object
      properties:
        logged_out:
          type: boolean
    User:
      type: object
      properties:
        user_id:
          type: string
        name:
          type: string
        email:
          type: string
        avatar_url:
          type: string
        status:
          type: string
          enum:
          - active
          - inactive
    TenantAccess:
      type: object
      properties:
