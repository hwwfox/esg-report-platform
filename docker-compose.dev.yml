services:
  postgres:
    image: postgres:15-alpine
    container_name: esg-postgres
    environment:
      POSTGRES_DB: esg_dev
      POSTGRES_USER: esg_user
      POSTGRES_PASSWORD: esg_password
    ports:
      - "5432:5432"
    volumes:
      - esg_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U esg_user -d esg_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: esg-redis
    ports:
      - "6379:6379"
    volumes:
      - esg_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: esg-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - esg_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  mailhog:
    image: mailhog/mailhog:latest
    container_name: esg-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  esg_postgres_data:
  esg_redis_data:
  esg_minio_data:
